<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Todo Card | Productivity Suite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card" role="region" aria-label="Todo task card">
        <div class="card-content">
            <!-- Header -->
            <div class="header-section">
                <div class="title-area">
                    <h2 data-testid="test-todo-title" id="task-title">Finalize Q2 product roadmap</h2>
                </div>
                <span data-testid="test-todo-status" id="status-badge" class="status-badge status-pending" aria-live="polite">
                    ⏳ Pending
                </span>
            </div>

            <!-- Description -->
            <p data-testid="test-todo-description" id="task-description" class="description">
                Review stakeholder feedback, align with engineering capacity, and present final version to leadership by Apr 30.
            </p>

            <!-- Priority & Due Date -->
            <div class="meta-row" id="meta-container">
                <div data-testid="test-todo-priority" id="priority-badge" class="priority priority-high" aria-label="Priority: High">
                    🔴 High
                </div>
                <div class="due-wrapper">
                    <time data-testid="test-todo-due-date" datetime="2026-04-30T23:59:00Z" id="due-date">
                        📅 Due Apr 30, 2026
                    </time>
                    <span data-testid="test-todo-time-remaining" id="time-remaining" class="time-remaining" aria-live="polite">
                        --
                    </span>
                </div>
            </div>

            <!-- Tags -->
            <div class="tags-section">
                <ul class="tags-list" role="list" aria-label="Task categories" id="tags-list">
                    <li data-testid="test-todo-tag-work" class="tag">💼 Work</li>
                    <li data-testid="test-todo-tag-urgent" class="tag">⚡ Urgent</li>
                    <li data-testid="test-todo-tags" class="tag">📊 Strategy</li>
                </ul>
            </div>

            <!-- Checkbox -->
            <div class="checkbox-section">
                <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle" />
                <label for="complete-toggle" id="checkbox-label">Mark as completed</label>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button data-testid="test-todo-edit-button" class="edit-btn" aria-label="Edit task">
                    ✏️ Edit
                </button>
                <button data-testid="test-todo-delete-button" class="delete-btn" aria-label="Delete task">
                    🗑️ Delete
                </button>
            </div>
        </div>
    </article>

    <script src="script.js"></script>

</body>
</html>
